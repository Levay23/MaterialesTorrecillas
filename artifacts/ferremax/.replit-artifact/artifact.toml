kind = "web"
previewPath = "/"
title = "FerreMax CRM"
version = "1.0.0"
id = "artifacts/ferremax"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22372

[services.development]
run = "pnpm --filter @workspace/ferremax run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ferremax", "run", "build" ]
publicDir = "artifacts/ferremax/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22372"
BASE_PATH = "/"
